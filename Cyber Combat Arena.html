<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Combat Arena - Giacomo Creation</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #05070f;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin: 5px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #f43f5e, 0 0 20px #a855f7;
            font-size: 1.8rem;
            text-align: center;
        }

        #ui-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 600px;
            font-size: 1.2rem;
            padding: 0 15px;
            margin-bottom: 8px;
            color: #38bdf8;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        /* --- ARENA --- */
        #arena {
            position: relative;
            width: 95vw;
            max-width: 600px;
            height: 60vh;
            max-height: 450px;
            background-color: #0b0f19;
            border: 3px solid #f43f5e;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(244, 63, 94, 0.25);
            overflow: hidden;
        }

        /* --- GIOCATORE --- */
        #hero {
            position: absolute;
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            transform: rotate(45deg);
            box-shadow: 0 0 20px #38bdf8, inset 0 0 8px #ffffff;
            border-radius: 4px;
        }

        /* FLASH DI SPARO */
        .muzzle-flash {
            position: absolute;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(34,197,94,0) 70%);
            transform: translate(-5px, -5px);
            pointer-events: none;
            animation: flashAnim 0.1s ease-out forwards;
        }

        @keyframes flashAnim {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* ANIMAZIONE SCOPPIO (NEMICO UCCISO) */
        .explosion {
            position: absolute;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #ff007f 10%, #a855f7 40%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: explodeAnim 0.3s ease-out forwards;
        }

        @keyframes explodeAnim {
            0% { transform: scale(0.3); opacity: 1; filter: brightness(2); }
            50% { filter: brightness(1.2); }
            100% { transform: scale(1.8); opacity: 0; }
        }

        /* --- PROIETTILI --- */
        .laser {
            position: absolute;
            width: 6px;
            height: 18px;
            background: #22c55e;
            border-radius: 99px;
            box-shadow: 0 0 15px #22c55e, 0 0 5px #ffffff;
        }

        /* --- NEMICI --- */
        .enemy {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #a855f7;
            filter: drop-shadow(0px 0px 8px #a855f7);
            animation: spinEnemy 3s linear infinite;
        }

        @keyframes spinEnemy {
            100% { transform: rotate(360deg); }
        }

        /* --- CONTROLLI MOBILE --- */
        #mobile-controls {
            display: none;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            width: 95vw;
            max-width: 600px;
            margin-top: 15px;
            padding: 5px;
        }

        .d-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .ctrl-btn {
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid #334155;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px 5px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            touch-action: manipulation;
        }
        .ctrl-btn:active { background: #38bdf8; color: black; border-color: #38bdf8; }
        
        #fire-btn {
            grid-column: 3;
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            border: none;
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.4);
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            #mobile-controls { display: grid; }
        }

        /* --- OVERLAY INTERFACCE DEL MENU --- */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(6, 9, 19, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 20px;
        }

        .btn-action {
            background: linear-gradient(90deg, #f43f5e, #a855f7);
            color: white; border: none; padding: 14px 40px;
            font-size: 1.2rem; font-weight: bold; border-radius: 50px;
            cursor: pointer; box-shadow: 0 5px 15px rgba(244, 63, 94, 0.4);
            transition: 0.2s; text-transform: uppercase;
            margin-top: 25px;
        }
        .btn-action:hover { transform: scale(1.05); box-shadow: 0 0 25px #f43f5e; }

        /* --- DIFFERENZIAZIONE SCHERMATE --- */
        #game-title-screen { 
            font-size: 2.2rem; 
            text-transform: uppercase; 
            text-align: center; 
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        .status-gameover {
            color: #ef4444 !important;
            font-family: 'Impact', 'Arial Black', sans-serif;
            text-shadow: 0 0 15px #ef4444, 0 0 30px #7f1d1d;
            animation: shake 0.4s ease-in-out;
        }

        .status-victory {
            color: #22c55e !important;
            font-family: 'Georgia', serif;
            text-shadow: 0 0 15px #22c55e, 0 0 30px #14532d;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        .instructions { color: #94a3b8; margin-bottom: 10px; font-size: 0.9rem; text-align: center; line-height: 1.6; }
        .system-btn { margin-top: 25px; color: #64748b; text-decoration: none; font-size: 0.9rem; border-bottom: 1px solid transparent; }
        .system-btn:hover { color: white; border-color: white; }
    </style>
</head>
<body>

    <h1>Cyber Combat Arena</h1>
    <div id="ui-bar">
        <div>Score: <span id="score-val">0</span> / 175</div>
        <div>Integrità: <span id="hp-val">100</span>%</div>
    </div>

    <div id="arena">
        <div id="overlay">
            <div id="game-title-screen">Invasione Malware</div>
            <div class="instructions" id="sub-text">
                <b>PC:</b> FRECCE / WASD per muoverti • SPAZIO per sparare<br>
                <b>MOBILE:</b> Usa i tasti a schermo touch
            </div>
            <button class="btn-action" onclick="startGame()">Difendi il Sistema</button>
            <a href="giochi.html" class="system-btn">Torna alla Sala Giochi</a>
        </div>

        <div id="hero"></div>
    </div>

    <div id="mobile-controls">
        <div class="d-pad" style="grid-column: 1 / span 2;">
            <div></div>
            <div class="ctrl-btn" id="btn-up">▲</div>
            <div></div>
            <div class="ctrl-btn" id="btn-left">◀</div>
            <div class="ctrl-btn" id="btn-down">▼</div>
            <div class="ctrl-btn" id="btn-right">▶</div>
        </div>
        <div class="ctrl-btn" id="fire-btn">FIRE</div>
    </div>

    <script>
        const arena = document.getElementById('arena');
        const hero = document.getElementById('hero');
        const scoreDisplay = document.getElementById('score-val');
        const hpDisplay = document.getElementById('hp-val');
        const uiBar = document.getElementById('ui-bar');
        const overlay = document.getElementById('overlay');
        const titleScreen = document.getElementById('game-title-screen');
        const subText = document.getElementById('sub-text');

        let arenaWidth, arenaHeight;
        let heroX, heroY;
        let heroSpeed = 5;
        let score = 0, hp = 100;
        let gameActive = false;
        
        let keys = {};
        let mobileKeys = { up: false, down: false, left: false, right: false };
        let lasers = [];
        let enemies = [];
        
        let gameLoopInterval, enemySpawnInterval, musicInterval;
        let musicBeat = 0;

        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // AUDIO: ROBLOX "OOF" DAMAGE
        function playOofSound() {
            if(!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            let now = audioCtx.currentTime;
            osc.type = 'sawtooth';
            
            osc.frequency.setValueAtTime(120, now);
            osc.frequency.exponentialRampToValueAtTime(320, now + 0.12);
            
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);

            osc.start(now);
            osc.stop(now + 0.12);
        }

        // AUDIO: ADRENALINE BEAT (TAN-TAN-TAN-TAN)
        function playMusicBeat() {
            if (!audioCtx || !gameActive) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            let now = audioCtx.currentTime;
            osc.type = 'triangle';

            let baseFreq = (hp <= 40) ? 110 : 75; 

            if (musicBeat % 4 === 3) {
                osc.frequency.setValueAtTime(baseFreq * 1.2, now);
            } else {
                osc.frequency.setValueAtTime(baseFreq, now);
            }

            gain.gain.setValueAtTime(hp <= 40 ? 0.4 : 0.25, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.18);

            osc.start(now);
            osc.stop(now + 0.18);
            musicBeat++;
        }

        function resizeArena() {
            arenaWidth = arena.clientWidth;
            arenaHeight = arena.clientHeight;
        }
        window.addEventListener('resize', resizeArena);

        window.addEventListener('keydown', (e) => { 
            keys[e.code] = true; 
            if(e.code === 'Space' && gameActive) { e.preventDefault(); shoot(); }
        });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        function setupMobileTouch(id, keyProp) {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); initAudio(); mobileKeys[keyProp] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); mobileKeys[keyProp] = false; });
        }
        setupMobileTouch('btn-up', 'up');
        setupMobileTouch('btn-down', 'down');
        setupMobileTouch('btn-left', 'left');
        setupMobileTouch('btn-right', 'right');
        document.getElementById('fire-btn').addEventListener('touchstart', (e) => { e.preventDefault(); initAudio(); if(gameActive) shoot(); });

        function startGame() {
            initAudio();
            resizeArena();
            
            titleScreen.className = "";
            uiBar.style.color = "#38bdf8";

            heroX = (arenaWidth / 2) - 15;
            heroY = arenaHeight - 50;
            score = 0; hp = 100;
            
            lasers.forEach(l => l.element.remove());
            enemies.forEach(e => e.element.remove());
            lasers = []; enemies = [];
            
            scoreDisplay.innerText = score;
            hpDisplay.innerText = hp;
            overlay.style.display = 'none';
            gameActive = true;

            gameLoopInterval = setInterval(updateGame, 1000 / 60);
            enemySpawnInterval = setInterval(spawnEnemy, 700); 
            
            clearInterval(musicInterval);
            let tempoSpeed = hp <= 40 ? 140 : 250;
            musicInterval = setInterval(playMusicBeat, tempoSpeed);
        }

        function shoot() {
            const laserEl = document.createElement('div');
            laserEl.classList.add('laser');
            let lx = heroX + 12;
            let ly = heroY - 15;
            laserEl.style.left = lx + 'px';
            laserEl.style.top = ly + 'px';
            arena.appendChild(laserEl);
            lasers.push({ element: laserEl, x: lx, y: ly });

            const flash = document.createElement('div');
            flash.classList.add('muzzle-flash');
            flash.style.left = heroX + 'px';
            flash.style.top = heroY + 'px';
            arena.appendChild(flash);
            setTimeout(() => flash.remove(), 100);
        }

        function spawnEnemy() {
            if(!gameActive) return;
            const enemyEl = document.createElement('div');
            enemyEl.classList.add('enemy');
            let x = Math.floor(Math.random() * (arenaWidth - 30));
            enemyEl.style.left = x + 'px';
            enemyEl.style.top = '-30px';
            arena.appendChild(enemyEl);
            // DISCESA LENTA: Velocità controllata per darti tutto il tempo di mirare
            enemies.push({ element: enemyEl, x: x, y: -30, speed: 0.8 + Math.random() * 0.8 });
        }

        function triggerExplosion(x, y) {
            const exp = document.createElement('div');
            exp.classList.add('explosion');
            exp.style.left = x + 'px';
            exp.style.top = y + 'px';
            arena.appendChild(exp);
            setTimeout(() => exp.remove(), 300);
        }

        function updateGame() {
            if (keys['ArrowUp'] || keys['KeyW'] || mobileKeys.up) heroY = Math.max(0, heroY - heroSpeed);
            if (keys['ArrowDown'] || keys['KeyS'] || mobileKeys.down) heroY = Math.min(arenaHeight - 30, heroY + heroSpeed);
            if (keys['ArrowLeft'] || keys['KeyA'] || mobileKeys.left) heroX = Math.max(0, heroX - heroSpeed);
            if (keys['ArrowRight'] || keys['KeyD'] || mobileKeys.right) heroX = Math.min(arenaWidth - 30, heroX + heroSpeed);

            hero.style.left = heroX + 'px';
            hero.style.top = heroY + 'px';

            if (hp <= 40) {
                uiBar.style.color = "#ef4444";
                if(musicInterval) {
                    clearInterval(musicInterval);
                    musicInterval = setInterval(playMusicBeat, 140);
                }
            } else {
                uiBar.style.color = "#38bdf8";
            }

            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i];
                l.y -= 8;
                l.element.style.top = l.y + 'px';
                if (l.y < -20) {
                    l.element.remove();
                    lasers.splice(i, 1);
                }
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.y += e.speed;
                e.element.style.top = e.y + 'px';

                if (e.y > arenaHeight) {
                    hp = Math.max(0, hp - 5);
                    hpDisplay.innerText = hp;
                    playOofSound();
                    e.element.remove();
                    enemies.splice(i, 1);
                    if(hp <= 0) gameOver();
                    continue;
                }

                if (Math.abs(heroX - e.x) < 25 && Math.abs(heroY - e.y) < 25) {
                    hp = Math.max(0, hp - 15);
                    hpDisplay.innerText = hp;
                    playOofSound();
                    triggerExplosion(e.x, e.y);
                    e.element.remove();
                    enemies.splice(i, 1);
                    if(hp <= 0) gameOver();
                    continue;
                }

                for (let j = lasers.length - 1; j >= 0; j--) {
                    let l = lasers[j];
                    if (Math.abs(l.x - e.x - 10) < 20 && Math.abs(l.y - e.y) < 25) {
                        triggerExplosion(e.x, e.y);
                        e.element.remove();
                        enemies.splice(i, 1);
                        l.element.remove();
                        lasers.splice(j, 1);
                        
                        score += 10;
                        scoreDisplay.innerText = score;

                        if (score >= 175) {
                            gameWin();
                            return;
                        }
                        break;
                    }
                }
            }
        }

        function gameOver() {
            gameActive = false;
            clearInterval(gameLoopInterval);
            clearInterval(enemySpawnInterval);
            clearInterval(musicInterval);
            
            titleScreen.className = "status-gameover";
            titleScreen.innerText = "GAME OVER";
            subText.innerHTML = "L'infezione ha corrotto il nucleo.<br><br><span style='font-size: 1.3rem; color: white;'>Punteggio finale: <b style='color:#ef4444;'>" + score + "</b> / 175</span>";
            overlay.style.display = 'flex';
        }

        function gameWin() {
            gameActive = false;
            clearInterval(gameLoopInterval);
            clearInterval(enemySpawnInterval);
            clearInterval(musicInterval);
            
            lasers.forEach(l => l.element.remove());
            enemies.forEach(e => e.element.remove());
            lasers = []; enemies = [];

            titleScreen.className = "status-victory";
            titleScreen.innerText = "🏆 VITTORIA SUBLIME 🏆";
            subText.innerHTML = "Sistema completamente ripulito con successo!<br><br><span style='font-size: 1.3rem; color: white;'>Sei entrato nella Hall of Fame di <b>Giacomo Creation</b>.</span>";
            overlay.style.display = 'flex';
        }
    </script>
    </section>
    </div>

    <footer>
        © 2026 Giacomo Creation – Tutte le creazioni sono di Giacomo.
    </footer>

</body>
</html>
